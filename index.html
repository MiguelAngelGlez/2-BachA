<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fin de curso 2º BachA</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f9;
  text-align: center;
}

/* FOTO RESPONSIVE */
.header img {
  width: 100%;
  height: auto;
  display: block;
}

/* TITULO */
h1 {
  margin: 20px 0 10px;
  font-size: 28px;
}

/* MENSAJE PROFESOR */
.mensaje-profe {
  font-style: italic;
  margin: 10px 20px 30px;
  color: #444;
}

/* GRID MENSAJES */
.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* TARJETAS */
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: left;
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.nombre {
  font-weight: bold;
  margin-bottom: 8px;
  color: #333;
}
</style>

</head>

<body>

<!-- FOTO -->
<div class="header">
  <img src="FOTO.jpg" alt="Clase">
</div>

<h1>🎓 Fin de curso 2º Bachillerato A</h1>

<div class="mensaje-profe">
  "Ha sido un placer acompañaros este curso. Os deseo lo mejor ❤️"
</div>

<!-- AQUI SALEN LOS MENSAJES -->
<div class="contenedor" id="mensajes"></div>

<script>

// 📌 GOOGLE SHEETS CSV (TU ENLACE)
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-LsIMtTnuZJFF-cGy6loSQiolJl4bQC6fC8E0Y4mn41EhDwLToRpQSn4Y_2Hl6WrVCXSciaFz9Bg0/pub?output=csv";

fetch(url)
  .then(res => res.text())
  .then(data => {

    const filas = data.split("\n").slice(1);
    const contenedor = document.getElementById("mensajes");

    // mezclar orden
    filas.sort(() => Math.random() - 0.5);

    filas.forEach(fila => {

      if (!fila.trim()) return;

      const columnas = fila.split(",");

      const nombre = columnas[1]?.replace(/"/g, "").trim();
      const mensaje = columnas[2]?.replace(/"/g, "").trim();

      if (!nombre || !mensaje) return;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="nombre">${nombre}</div>
        <div>${mensaje}</div>
      `;

      contenedor.appendChild(card);
    });

  })
  .catch(err => {
    console.error("Error cargando mensajes:", err);
  });

</script>

</body>
</html>
