<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fin de curso 2º BachA</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f9;
  text-align: center;
}

/* FOTO */
.header img {
  width: 100%;
  height: auto;
  display: block;
}

/* TITULO */
h1 {
  margin: 20px 0 10px;
  font-size: 28px;
}

/* MENSAJE PROFE */
.mensaje-profe {
  font-style: italic;
  margin: 10px 20px 20px;
  color: #444;
}

/* FORMULARIO */
.form {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 20px;
  border: none;
  background: #333;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* MENSAJES */
.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: left;
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.nombre {
  font-weight: bold;
  margin-bottom: 8px;
  color: #333;
}
</style>

</head>

<body>

<!-- FOTO -->
<div class="header">
  <img src="FOTO.jpg" alt="Clase">
</div>

<h1>🎓 Fin de curso 2º Bachillerato A</h1>

<div class="mensaje-profe">
  "Ha sido un placer acompañaros este curso. Os deseo lo mejor ❤️"
</div>

<!-- FORMULARIO -->
<div class="form">
  <h3>💬 Deja tu mensaje</h3>

  <input type="text" id="nombre" placeholder="Tu nombre">
  <textarea id="mensaje" placeholder="Tu mensaje"></textarea>

  <button onclick="enviar()">Enviar</button>
</div>

<!-- MENSAJES -->
<div class="contenedor" id="mensajes"></div>

<script>

// 🔥 TU SCRIPT DE GOOGLE APPS SCRIPT
const scriptURL = "https://script.google.com/macros/s/AKfycbz1GV74T5ZJu9yKB9_TJb0LmLPRA8e2pUzlJ2yyWkn6xnb5wp-sz12serMyuINPJ3Dn/exec";

// ENVIAR MENSAJE
function enviar() {

  const nombre = document.getElementById("nombre").value;
  const mensaje = document.getElementById("mensaje").value;

  if (!nombre || !mensaje) {
    alert("Rellena todo 😊");
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({ nombre, mensaje })
  })
  .then(() => {
    alert("Mensaje enviado ❤️");
    document.getElementById("nombre").value = "";
    document.getElementById("mensaje").value = "";
    cargarMensajes();
  })
  .catch(err => console.error(err));
}

// CARGAR MENSAJES
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-LsIMtTnuZJFF-cGy6loSQiolJl4bQC6fC8E0Y4mn41EhDwLToRpQSn4Y_2Hl6WrVCXSciaFz9Bg0/pub?output=csv";

function cargarMensajes() {

  fetch(url)
    .then(res => res.text())
    .then(data => {

      const filas = data.split("\n").slice(1);
      const contenedor = document.getElementById("mensajes");

      contenedor.innerHTML = "";

      filas
        .filter(f => f.trim() !== "")
        .sort(() => Math.random() - 0.5)
        .forEach(fila => {

          const columnas = fila.split(",");

          const nombre = columnas[1]?.replace(/"/g, "").trim();
          const mensaje = columnas[2]?.replace(/"/g, "").trim();

          if (!nombre || !mensaje) return;

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="nombre">${nombre}</div>
            <div>${mensaje}</div>
          `;

          contenedor.appendChild(card);
        });

    });

}

// cargar al entrar
cargarMensajes();

</script>

</body>
</html>
