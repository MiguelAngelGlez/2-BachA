<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fin de curso 2º BachA</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f9;
  text-align: center;
}

.header img {
  width: 100%;
  height: auto;
  display: block;
}

h1 { margin: 15px 0; }

.mensaje-profe {
  font-style: italic;
  margin-bottom: 10px;
  color: #444;
}

/* FORMULARIO */
.form {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);

  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BOTÓN */
button {
  padding: 10px;
  border: none;
  background: #333;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* MENSAJES */
.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: left;
}

.nombre {
  font-weight: bold;
  margin-bottom: 5px;
}
</style>

</head>

<body>

<div class="header">
  <img src="FOTO.jpg">
</div>

<h1>🎓 Fin de curso 2º BachA</h1>

<div class="mensaje-profe">
  "Ha sido un placer acompañaros ❤️"
</div>

<!-- FORMULARIO -->
<div class="form">
  <h3>💬 Escribe tu mensaje</h3>

  <input id="nombre" placeholder="Tu nombre">
  <textarea id="mensaje" placeholder="Tu mensaje"></textarea>

  <button onclick="enviar()">Enviar</button>
</div>

<!-- MENSAJES -->
<div class="contenedor" id="mensajes"></div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbz1GV74T5ZJu9yKB9_TJb0LmLPRA8e2pUzlJ2yyWkn6xnb5wp-sz12serMyuINPJ3Dn/exec";

function enviar() {

  const nombre = document.getElementById("nombre").value;
  const mensaje = document.getElementById("mensaje").value;

  if (!nombre || !mensaje) {
    alert("Rellena todo 😊");
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "nombre=" + encodeURIComponent(nombre) +
          "&mensaje=" + encodeURIComponent(mensaje)
  })
  .then(r => r.text())
  .then(res => {
    document.getElementById("nombre").value = "";
    document.getElementById("mensaje").value = "";
    cargarMensajes();
  })
  .catch(err => {
    console.error(err);
    alert("Error enviando mensaje");
  });
}

/* ⚠️ IMPORTANTE:
   SIN CSV ahora no podemos leer automáticamente desde Apps Script
   así que usamos Google Sheets publicado (lo que ya tenías) */

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-LsIMtTnuZJFF-cGy6loSQiolJl4bQC6fC8E0Y4mn41EhDwLToRpQSn4Y_2Hl6WrVCXSciaFz9Bg0/pub?output=csv";

function cargarMensajes() {

  fetch(url + "&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {

      const contenedor = document.getElementById("mensajes");
      contenedor.innerHTML = "";

      const filas = data.split("\n").slice(1);

      filas.forEach(fila => {

        const c = fila.split(",");

        const nombre = (c[1] || "").replace(/"/g, "").trim();
        const mensaje = (c[2] || "").replace(/"/g, "").trim();

        if (!nombre || !mensaje) return;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="nombre">${nombre}</div>
          <div>${mensaje}</div>
        `;

        contenedor.appendChild(card);
      });

    });
}

cargarMensajes();

</script>

</body>
</html>
