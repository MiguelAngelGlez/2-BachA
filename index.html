<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fin de curso 2º BachA</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f9;
  text-align: center;
}

.header img {
  width: 100%;
  height: auto;
  display: block;
}

h1 { margin: 15px 0; }

.mensaje-profe {
  font-style: italic;
  margin-bottom: 10px;
  color: #444;
}

/* BOTÓN DISCRETO */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #333;
  color: white;
  padding: 12px 16px;
  border-radius: 50px;
  cursor: pointer;
}

/* FORMULARIO OCULTO */
.form {
  display: none;
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

/* MENSAJES */
.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: left;
}

.nombre { font-weight: bold; }
</style>

</head>

<body>

<div class="header">
  <img src="FOTO.jpg">
</div>

<h1>🎓 Fin de curso 2º BachA</h1>

<div class="mensaje-profe">
  "Ha sido un placer acompañaros ❤️"
</div>

<!-- FORMULARIO -->
<div class="form" id="form">
  <h3>💬 Escribe tu mensaje</h3>
  <input id="nombre" placeholder="Tu nombre">
  <textarea id="mensaje" placeholder="Tu mensaje"></textarea>
  <button onclick="enviar()">Enviar</button>
</div>

<!-- MENSAJES -->
<div class="contenedor" id="mensajes"></div>

<!-- BOTÓN -->
<div class="fab" onclick="toggleForm()">✍️ Escribir</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbz1GV74T5ZJu9yKB9_TJb0LmLPRA8e2pUzlJ2yyWkn6xnb5wp-sz12serMyuINPJ3Dn/exec";

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-LsIMtTnuZJFF-cGy6loSQiolJl4bQC6fC8E0Y4mn41EhDwLToRpQSn4Y_2Hl6WrVCXSciaFz9Bg0/pub?output=csv";

/* FORMULARIO ON/OFF */
function toggleForm() {
  const f = document.getElementById("form");
  f.style.display = (f.style.display === "block") ? "none" : "block";
}

/* ENVIAR */
function enviar() {

  const nombre = document.getElementById("nombre").value;
  const mensaje = document.getElementById("mensaje").value;

  if (!nombre || !mensaje) {
    alert("Rellena todo 😊");
    return;
  }

  const formData = new FormData();
  formData.append("nombre", nombre);
  formData.append("mensaje", mensaje);

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
  .then(() => {
    document.getElementById("nombre").value = "";
    document.getElementById("mensaje").value = "";
    document.getElementById("form").style.display = "none";
    cargarMensajes();
  });
}

/* MENSAJES */
function cargarMensajes() {

  fetch(url)
    .then(res => res.text())
    .then(data => {

      const filas = data.split("\n").slice(1);
      const contenedor = document.getElementById("mensajes");

      contenedor.innerHTML = "";

      filas
        .filter(f => f.trim() !== "")
        .forEach(fila => {

          const c = fila.split(",");

          const nombre = c[1]?.replace(/"/g, "").trim();
          const mensaje = c[2]?.replace(/"/g, "").trim();

          if (!nombre || !mensaje) return;

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="nombre">${nombre}</div>
            <div>${mensaje}</div>
          `;

          contenedor.appendChild(card);
        });

    });
}

cargarMensajes();

</script>

</body>
</html>
