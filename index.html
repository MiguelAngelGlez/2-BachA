<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fin de curso</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    .header {
      position: relative;
    }

    .header img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    h1 {
      margin-top: 20px;
    }

    .mensaje-profe {
      margin: 20px;
      font-style: italic;
    }

    .contenedor {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    .nombre {
      font-weight: bold;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="FOTO.jpg">
</div>

<h1>🎓 Fin de curso 2026</h1>

<div class="mensaje-profe">
  "Ha sido un placer acompañaros este curso ❤️"
</div>

<div class="contenedor" id="mensajes"></div>

<script>
const url = "AQUI_PEGA_TU_CSV";

fetch(url)
  .then(res => res.text())
  .then(data => {
    const filas = data.split("\n").slice(1);

    const contenedor = document.getElementById("mensajes");

    filas.sort(() => Math.random() - 0.5);

    filas.forEach(fila => {
      const columnas = fila.split(",");

      const nombre = columnas[1];
      const mensaje = columnas[2];

      if (!nombre || !mensaje) return;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="nombre">${nombre}</div>
        <div>${mensaje}</div>
      `;

      contenedor.appendChild(card);
    });
  });
</script>

</body>
</html>
